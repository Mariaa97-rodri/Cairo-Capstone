# Server
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/cairo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=buvwex-nyFdep-vinve7
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# This fixes the project-key vs project_key column name issue
# by telling Hibernate to use column names exactly as written
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT
app.jwt.secret=cairo-super-secret-key-change-this-in-production-min-256-bits
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.cairo=DEBUG
logging.level.org.springframework.security=DEBUG